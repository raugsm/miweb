<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 845 220" role="img" aria-labelledby="title desc">
  <title id="title">ARIAD GSM horizontal logo</title>
  <desc id="desc">Compact horizontal ARIAD GSM logo with ARIAD in white inside a blue block and GSM in blue.</desc>
  <defs>
    <linearGradient id="ariad-blue" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#2070FC"/>
      <stop offset="0.55" stop-color="#2070FC"/>
      <stop offset="1" stop-color="#2070FC"/>
    </linearGradient>
    <filter id="soft-depth" x="-7%" y="-18%" width="114%" height="136%">
      <feDropShadow dx="0" dy="8" stdDeviation="11" flood-color="#2070FC" flood-opacity="0.12"/>
    </filter>
    <filter id="accent-glow" x="-20%" y="-80%" width="140%" height="260%">
      <feGaussianBlur stdDeviation="5" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <rect width="845" height="220" fill="none"/>

  <g filter="url(#soft-depth)">
    <path
      d="M60 31H440C481 31 502 57 496 92L480 160C474 184 452 192 424 192H33C14 192 5 179 10 160L37 61C41 42 47 31 60 31Z"
      fill="url(#ariad-blue)"/>
  </g>

  <path
    d="M504 66H764C783 66 795 80 791 98L779 151C776 166 763 174 745 174H496L507 156H743C751 156 756 153 758 146L766 107C769 94 760 86 747 86H499Z"
    fill="#F4F8FF"
    opacity="0.98"/>
  <path
    d="M504 66H764C783 66 795 80 791 98"
    fill="none"
    stroke="#2070FC"
    stroke-width="6"
    stroke-linecap="round"
    opacity="0.72"
    filter="url(#accent-glow)"/>
  <path
    d="M505 156H743C751 156 756 153 758 146"
    fill="none"
    stroke="#2070FC"
    stroke-width="5"
    stroke-linecap="round"
    opacity="0.82"/>
  <path d="M507 73L490 148" stroke="#2070FC" stroke-width="6" stroke-linecap="round" opacity="0.72"/>
  <path
    d="M500 174H745C763 174 776 166 779 151L782 138C771 168 749 184 716 184H495Z"
    fill="#2070FC"
    opacity="0.09"/>

  <text
    x="68"
    y="107"
    fill="#FFFFFF"
    font-family="Arial Black, Montserrat, Gotham, Helvetica Neue, Arial, sans-serif"
    font-size="108"
    font-weight="900"
    font-style="italic"
    dominant-baseline="central"
    letter-spacing="-2">ARIAD</text>

  <text
    x="512"
    y="107"
    fill="#2070FC"
    font-family="Arial Black, Montserrat, Gotham, Helvetica Neue, Arial, sans-serif"
    font-size="108"
    font-weight="900"
    font-style="italic"
    dominant-baseline="central"
    letter-spacing="-2">GSM</text>
</svg>
