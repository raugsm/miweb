<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 845 220" role="img" aria-labelledby="title desc">
  <title id="title">ARIAD GSM horizontal reverse logo</title>
  <desc id="desc">Compact ARIAD GSM logo for dark backgrounds.</desc>
  <defs>
    <linearGradient id="ariad-blue" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#2070FC"/>
      <stop offset="0.55" stop-color="#2070FC"/>
      <stop offset="1" stop-color="#2070FC"/>
    </linearGradient>
    <filter id="soft-depth" x="-7%" y="-18%" width="114%" height="136%">
      <feDropShadow dx="0" dy="8" stdDeviation="11" flood-color="#000000" flood-opacity="0.18"/>
    </filter>
    <filter id="accent-glow" x="-20%" y="-80%" width="140%" height="260%">
      <feGaussianBlur stdDeviation="7" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="gsm-depth" x="-8%" y="-20%" width="116%" height="140%">
      <feDropShadow dx="0" dy="5" stdDeviation="5" flood-color="#000000" flood-opacity="0.34"/>
    </filter>
  </defs>

  <rect width="845" height="220" fill="none"/>

  <path
    d="M60 31H440C481 31 502 57 496 92L480 160C474 184 452 192 424 192H33C14 192 5 179 10 160L37 61C41 42 47 31 60 31Z"
    fill="none"
    stroke="#2070FC"
    stroke-width="5"
    opacity="0.45"
    filter="url(#accent-glow)"/>
  <g filter="url(#soft-depth)">
    <path
      d="M60 31H440C481 31 502 57 496 92L480 160C474 184 452 192 424 192H33C14 192 5 179 10 160L37 61C41 42 47 31 60 31Z"
      fill="url(#ariad-blue)"/>
  </g>
  <path
    d="M76 43H432C456 43 474 54 483 73"
    fill="none"
    stroke="#2070FC"
    stroke-width="7"
    stroke-linecap="round"
    opacity="0.38"/>

  <path d="M506 70L490 150" stroke="#2070FC" stroke-width="7" stroke-linecap="round" opacity="0.9"/>
  <path d="M528 72H754" stroke="#2070FC" stroke-width="5" stroke-linecap="round" opacity="0.9"/>
  <path d="M520 160H744" stroke="#2070FC" stroke-width="5" stroke-linecap="round" opacity="0.9"/>

  <text
    x="68"
    y="107"
    fill="#FFFFFF"
    font-family="Arial Black, Montserrat, Gotham, Helvetica Neue, Arial, sans-serif"
    font-size="108"
    font-weight="900"
    font-style="italic"
    dominant-baseline="central"
    letter-spacing="-2">ARIAD</text>

  <text
    x="512"
    y="107"
    fill="#FFFFFF"
    stroke="#2070FC"
    stroke-width="2.5"
    paint-order="stroke"
    font-family="Arial Black, Montserrat, Gotham, Helvetica Neue, Arial, sans-serif"
    font-size="108"
    font-weight="900"
    font-style="italic"
    dominant-baseline="central"
    letter-spacing="-2"
    filter="url(#gsm-depth)">GSM</text>
</svg>
