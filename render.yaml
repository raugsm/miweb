services:
  - type: web
    name: ariadgsm-ops
    runtime: node
    plan: starter
    buildCommand: npm install
    startCommand: npm start
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: ARIAD_DATA_DIR
        value: /opt/render/project/src/storage
      - key: ARIAD_SETUP_TOKEN
        generateValue: true
    disk:
      name: ariadgsm-ops-data
      mountPath: /opt/render/project/src/storage
      sizeGB: 1
